<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Search</title>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-ui/1.12.1/jquery-ui.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-ui/1.12.1/jquery-ui.min.js"></script>
</head>
<body>
    <h1>Package Search</h1>
    <label for="startDate">Start Date:</label>
    <input type="text" id="startDate" />
    <label for="endDate">End Date:</label>
    <input type="text" id="endDate" />
    <div id="dateRangeDisplay"></div>
    <button id="fetchPackagesButton">Fetch Packages</button>
    <script>
        function initializeDatePicker() {
            var today = new Date();
            $('#startDate').datepicker({ dateFormat: 'yy-mm-dd' }).datepicker('setDate', today);
            $('#endDate').datepicker({ dateFormat: 'yy-mm-dd' });
        }

        function updateDateRangeDisplay() {
            var startDate = new Date($('#startDate').val());
            var endDate = new Date($('#endDate').val());
            var timeDiff = endDate - startDate;
            var dayDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
            $('#dateRangeDisplay').text(`Date Range: ${$('#startDate').val()} to ${$('#endDate').val()} (${dayDiff} days)`);
        }

        $('#startDate').change(updateDateRangeDisplay);
        $('#endDate').change(updateDateRangeDisplay);
        $('#fetchPackagesButton').click(function() {
            fetchPackages($('#startDate').val(), $('#endDate').val());
        });

        function fetchPackages(startDate, endDate) {
            // Fetch packages logic here, using both startDate and endDate
            console.log(`Fetching packages from ${startDate} to ${endDate}`);
        }

        $(document).ready(function() {
            initializeDatePicker();
        });
    </script>
</body>
</html>
